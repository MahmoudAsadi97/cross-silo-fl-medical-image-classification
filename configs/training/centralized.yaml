epochs: 25
batch_size: 32
learning_rate: 0.001
optimizer: adam
weight_decay: 0.0001
seed: 42
device: cuda

scheduler:
  name: reduce_on_plateau
  mode: max
  factor: 0.5
  patience: 2
  min_lr: 1e-6
  monitor: macro_f1

early_stopping:
  enabled: true
  monitor: macro_f1
  mode: max
  patience: 5
  min_delta: 0.001
